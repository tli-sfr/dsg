include classpath("application.conf")

queues {
  dsg-job-queue {
    defaultVisibilityTimeout = 30 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
    deadLettersQueue {
      name = "dsg-job-dlq"
      maxReceiveCount = 5
    }
  }
  dsg-job-detail-queue {
    defaultVisibilityTimeout = 60 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
    deadLettersQueue {
      name = "dsg-job-detail-dlq"
      maxReceiveCount = 5
    }
  }
  dsg-job-dlq { }
  dsg-job-detail-dlq { }
}
