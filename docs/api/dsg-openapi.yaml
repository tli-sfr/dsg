openapi: 3.0.3
info:
  title: DSG Admin API
  description: |
    Directory Sync Gateway configuration API (wiki section 2.6).
    Service Web (SCL) → JWL → DSG. Phase 1 planning contract.
  version: 0.1.0
  contact:
    name: DSG Engineering

servers:
  - url: http://localhost:8080/dsg/v1
    description: Local API
  - url: https://{host}/dsg/v1
    description: Deployed
    variables:
      host:
        default: api.example.com

tags:
  - name: directory
  - name: oauth
  - name: scheduler
  - name: mapping
  - name: rules
  - name: jobs

paths:
  /{accountId}/directory:
    parameters:
      - $ref: '#/components/parameters/accountId'
    post:
      tags: [directory]
      summary: Configure directory connection
      operationId: createDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectoryConfigRequest'
      responses:
        '201':
          description: Created
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      tags: [directory]
      summary: Update directory group and active flag
      operationId: updateDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectoryUpdateRequest'
      responses:
        '200':
          description: Updated
    get:
      tags: [directory]
      summary: Get directory connection
      operationId: getDirectory
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectoryResponse'

  /{accountId}/directory/oauth:
    parameters:
      - $ref: '#/components/parameters/accountId'
    put:
      tags: [oauth]
      summary: Configure IDP OAuth credentials (ETM deferred)
      operationId: putDirectoryOAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectoryOAuthRequest'
      responses:
        '200':
          description: Saved
    get:
      tags: [oauth]
      summary: Get masked OAuth config
      operationId: getDirectoryOAuth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectoryOAuthResponse'

  /{accountId}/directory/oauth/test:
    parameters:
      - $ref: '#/components/parameters/accountId'
    post:
      tags: [oauth]
      summary: Test directory connectivity
      operationId: testDirectoryOAuth
      responses:
        '200':
          description: Connection OK
        '400':
          description: Test failed

  /{accountId}/scheduler:
    parameters:
      - $ref: '#/components/parameters/accountId'
    post:
      tags: [scheduler]
      summary: Configure sync schedule
      operationId: configureScheduler
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchedulerRequest'
      responses:
        '200':
          description: Configured

  /{accountId}/attribute-mapping:
    parameters:
      - $ref: '#/components/parameters/accountId'
    post:
      tags: [mapping]
      summary: Save basic and custom attribute mappings
      operationId: saveAttributeMapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttributeMappingRequest'
      responses:
        '200':
          description: Saved

  /{accountId}/rule:
    parameters:
      - $ref: '#/components/parameters/accountId'
    post:
      tags: [rules]
      summary: Create or replace provisioning rule with assignments
      operationId: createProvisioningRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisioningRuleRequest'
      responses:
        '201':
          description: Created
        '400':
          $ref: '#/components/responses/BadRequest'

  /{accountId}/jobs:
    parameters:
      - $ref: '#/components/parameters/accountId'
    post:
      tags: [jobs]
      summary: Trigger sync job (full, incremental, on-demand)
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '409':
          description: Another job already running for this account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{accountId}/jobs/{jobId}/report:
    parameters:
      - $ref: '#/components/parameters/accountId'
      - name: jobId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [jobs]
      summary: Get sync job report (P0-9 Phase 1)
      operationId: getJobReport
      responses:
        '200':
          description: Report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobReportResponse'

components:
  parameters:
    accountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    DirectoryConfigRequest:
      type: object
      required: [directoryType]
      properties:
        directoryType:
          type: string
          enum: [Azure, Okta, Google, OneLogin]
        etmSubscriberId:
          type: string
          description: Future ETM path; omit when using DSB OAuth

    DirectoryUpdateRequest:
      type: object
      properties:
        directoryGroupId:
          type: string
        active:
          type: boolean

    DirectoryResponse:
      type: object
      properties:
        directoryType:
          type: string
        directoryGroupId:
          type: string
        active:
          type: boolean
        connected:
          type: boolean

    DirectoryOAuthRequest:
      type: object
      properties:
        directoryType:
          type: string
        authFlow:
          type: string
        clientId:
          type: string
        clientSecret:
          type: string

    DirectoryOAuthResponse:
      type: object
      properties:
        directoryType:
          type: string
        clientId:
          type: string
        tokenExpiresAt:
          type: string
          format: date-time

    SchedulerRequest:
      type: object
      properties:
        incrementalEnabled:
          type: boolean
        cronExpression:
          type: string
        syncDirection:
          type: string
          enum: [DIR_TO_RC, RC_TO_DIR, BIDIRECTIONAL]

    AttributeMappingRequest:
      type: object
      properties:
        basicMappings:
          type: array
          items:
            $ref: '#/components/schemas/AttributeMappingRow'
        customMappings:
          type: array
          items:
            $ref: '#/components/schemas/AttributeMappingRow'

    AttributeMappingRow:
      type: object
      properties:
        syncDirection:
          type: string
        directoryAttribute:
          type: string
        rcAttribute:
          type: string

    SelectionExpression:
      type: object
      description: Provision rule match criteria (AND logic)
      properties:
        match:
          type: string
          enum: [ALL]
        criteria:
          type: array
          items:
            type: object
            properties:
              attribute:
                type: string
                example: user.department
              operator:
                type: string
                enum: [EQ]
              value:
                type: string
                example: Sales

    ProvisioningRuleRequest:
      type: object
      required: [ruleName, priority]
      properties:
        ruleName:
          type: string
        priority:
          type: integer
        selectionExpression:
          $ref: '#/components/schemas/SelectionExpression'
        licenseAssignments:
          type: array
          items:
            type: object
            properties:
              licenseType:
                type: string
                enum: [PRIMARY_LICENSE, ADD_ON_LICENSE]
              licenseId:
                type: string
        ruleBasedAttributeMappings:
          type: array
          items:
            type: object
        areaCodeAssignment:
          type: object
        deviceAssignments:
          type: array
          items:
            type: object
        templateAssignments:
          type: array
          items:
            type: object

    CreateJobRequest:
      type: object
      required: [jobType]
      properties:
        jobType:
          type: string
          enum: [FULL, INCREMENTAL, ON_DEMAND]
        externalUserIds:
          type: array
          items:
            type: string
          description: On-demand subset or failed-user retry

    JobResponse:
      type: object
      properties:
        jobId:
          type: string
        state:
          type: string

    JobReportResponse:
      type: object
      properties:
        jobId:
          type: string
        successCount:
          type: integer
        failedCount:
          type: integer
        failures:
          type: array
          items:
            type: object
            properties:
              externalId:
                type: string
              comment:
                type: string
