# Local profile — ElasticMQ via docker compose (SPIKE-4)
dsg:
  messaging:
    endpoint: http://localhost:9324
    region: us-east-1
    access-key-id: x
    secret-access-key: x
    job-queue-name: dsg-job-queue
    job-detail-queue-name: dsg-job-detail-queue
    wait-time-seconds: 1
    listener:
      enabled: false
      poll-interval-ms: 1000
