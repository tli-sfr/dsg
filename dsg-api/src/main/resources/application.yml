spring:
  application:
    name: dsg-backend
  datasource:
    url: jdbc:mysql://localhost:3307/dsb
    username: dsg
    password: dsg_dev
  flyway:
    enabled: true
    locations: classpath:db/migration

dsg:
  crypto:
    secret-key: local-dev-only-change-me
  app:
    public-base-url: ${DSG_APP_PUBLIC_BASE_URL:http://localhost:5173}
  rc:
    server-url: ${DSG_RC_SERVER_URL:https://platform.devtest.ringcentral.com}
    client-id: ${DSG_RC_CLIENT_ID:}
    client-secret: ${DSG_RC_CLIENT_SECRET:}
    redirect-uri: ${DSG_RC_REDIRECT_URI:http://localhost:5173/oauth/callback}
  messaging:
    endpoint: http://localhost:9324
    region: us-east-1
    access-key-id: x
    secret-access-key: x
    job-queue-name: dsg-job-queue
    job-detail-queue-name: dsg-job-detail-queue
    wait-time-seconds: 1
    listener:
      enabled: true
      poll-interval-ms: 1000

server:
  port: 8080
