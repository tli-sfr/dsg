spring:
  application:
    name: dsg-backend
  datasource:
    url: jdbc:mysql://localhost:3306/dsb
    username: dsg
    password: dsg_dev
  flyway:
    enabled: true
    locations: classpath:db/migration

dsg:
  crypto:
    secret-key: local-dev-only-change-me
  messaging:
    endpoint: http://localhost:9324
    region: us-east-1
    access-key-id: x
    secret-access-key: x
    job-queue-name: dsg-job-queue
    job-detail-queue-name: dsg-job-detail-queue
    wait-time-seconds: 1
    listener:
      enabled: true
      poll-interval-ms: 1000

server:
  port: 8080
