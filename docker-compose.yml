# Local development dependencies for DSG (planning / implementation)
# See docs/adr/002-queue-abstraction.md

services:
  mysql:
    image: mysql:8.0
    container_name: dsg-mysql
    environment:
      MYSQL_ROOT_PASSWORD: dsg_root
      MYSQL_DATABASE: dsb
      MYSQL_USER: dsg
      MYSQL_PASSWORD: dsg_dev
    ports:
      - "3307:3306"
    volumes:
      - dsg_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdsg_root"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: dsg-elasticmq
    ports:
      - "9324:9324"   # SQS API
      - "9325:9325"   # UI (optional)
    volumes:
      - ./config/elasticmq.conf:/opt/elasticmq.conf
    command: ["-Dconfig.file=/opt/elasticmq.conf"]

volumes:
  dsg_mysql_data:
